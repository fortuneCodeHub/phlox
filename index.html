<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phlox — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --bloom: #c8f55a;
      --muted: rgba(255,255,255,0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--bloom);
      margin: 0 auto 2.5rem;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1.5rem;
    }

    .tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      color: var(--muted);
      font-weight: 300;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 3rem;
    }

    .tagline strong {
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      padding: 0.5rem 1.25rem;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 4rem;
    }

    .badge span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--bloom);
      flex-shrink: 0;
    }

    .links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover { color: var(--bloom); }

    .divider {
      color: rgba(255,255,255,0.1);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div class="dot"></div>

  <h1 class="logo">Phlox</h1>

  <p class="tagline">
    <strong>AI-native influencer marketing</strong> for Nigerian brands and creators.
    Sourcing, contracts, content, and payouts — handled end to end.
  </p>

  <div class="badge">
    <span></span>
    Something is growing here — launching soon
  </div>

  <nav class="links">
    <a href="privacy-policy.html">Privacy Policy</a>
    <span class="divider">·</span>
    <a href="terms-of-service.html">Terms of Service</a>
    <span class="divider">·</span>
    <a href="mailto:hello@getphlox.com">Contact</a>
  </nav>

</body>
</html>
